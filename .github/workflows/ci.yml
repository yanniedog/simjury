name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required docs exist
        run: |
          set -euo pipefail
          for f in README.md PILOT-SPEC.md ROADMAP.md CASE_HARNESS.md AGENTS.md CLAUDE.md; do
            test -f "$f" || { echo "Missing $f"; exit 1; }
          done
          test -d .projectmem || { echo "Missing .projectmem"; exit 1; }
          test -f .projectmem/events.jsonl || { echo "Missing projectmem events"; exit 1; }

      - name: Validate projectmem config
        run: |
          test -f .projectmem/config.toml
          test -f .projectmem/AI_INSTRUCTIONS.md

      - name: Check agent harness references
        run: |
          grep -q "CASE_HARNESS" AGENTS.md
          grep -q "Phase" ROADMAP.md
          grep -q "bot-presence-gate" AGENTS.md
          grep -q "bot-presence-gate" .github/BRANCH_PROTECTION.md
          test -f WORKFLOW.md
          test -f .github/MERGE_POLICY.md
          test -f .github/rulesets/main-bot-gates.json
          test -x .github/scripts/assert-pr-mergeable.sh || test -f .github/scripts/assert-pr-mergeable.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify PR gate scripts
        run: |
          npm run pr:gate-logic:verify
          npm run pr:gate-exempt-policy:verify
          npm run pilot:auto-release-commit:verify

      - name: Set up Java
        if: hashFiles('pilot/**') != ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Run pilot tests
        if: hashFiles('pilot/**') != ''
        working-directory: pilot
        run: |
          chmod +x gradlew
          ./gradlew test --console=plain

      - name: Set up Android SDK (build-only)
        if: hashFiles('pilot/app/**') != ''
        run: bash .github/scripts/setup-android-sdk.sh pilot/local.properties

      - name: Assemble Android debug APK
        if: hashFiles('pilot/app/**') != ''
        working-directory: pilot
        run: ./gradlew :app:assembleDebug --console=plain

      - name: Pilot placeholder (Phase 0)
        if: hashFiles('pilot/**') == ''
        run: echo "Phase 0 — pilot app not yet present; docs-only validation passed"
