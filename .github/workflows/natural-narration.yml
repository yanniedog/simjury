name: natural-narration

on:
  workflow_dispatch:
    inputs:
      case_id:
        description: "Docket id, comma-separated ids, or all"
        required: true
        default: "dd-0022"
  push:
    branches: [main]
    paths:
      - "site/app/docket/*.json"
      - "site/app/src/lib/narration.ts"
      - "site/app/src/lib/narratorCues.ts"
      - "site/app/src/lib/narratorCueCopy.json"
      - "site/narration-requirements.txt"
      - "site/scripts/build-kokoro-jobs.mjs"
      - "site/scripts/generate-kokoro-clips.py"
      - "site/scripts/publish-kokoro-clips.mjs"
      - ".github/workflows/natural-narration.yml"

permissions:
  actions: read
  contents: write

concurrency:
  group: natural-narration
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      cases: ${{ steps.cases.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - id: cases
        shell: bash
        env:
          REQUESTED_CASES: ${{ inputs.case_id }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            requested="$REQUESTED_CASES"
          else
            changed="$(git diff --name-only HEAD^ HEAD)"
            # Only synthesis inputs / spoken cue copy should force all.
            # build-kokoro-jobs matrix/filter changes (e.g. adding dd-intro) should
            # use workflow_dispatch for the affected case ids instead.
            if grep -Eq '^(site/app/src/lib/(narration|narratorCues)\.ts|site/app/src/lib/narratorCueCopy\.json|site/narration-requirements\.txt|site/scripts/generate-kokoro-clips\.py)$' <<< "$changed"; then
              requested="all"
            else
              requested="$(sed -nE 's#^site/app/docket/(dd-[0-9]{4}|dd-intro)\.json$#\1#p' <<< "$changed" |
                sort -u | paste -sd, -)"
            fi
          fi
          if [[ -z "$requested" ]]; then
            echo "No narration corpus changes; skipping generation."
            echo "value=[]" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(node site/scripts/build-kokoro-jobs.mjs --case "$requested" --list)" >> "$GITHUB_OUTPUT"
          fi
      - name: Create stable GitHub voice-pack releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for shard in $(seq 0 31); do
            tag="narration-kokoro-$shard"
            gh release view "$tag" >/dev/null 2>&1 ||
              gh release create "$tag" --title "Kokoro natural narration — shard $shard" \
                --notes "Apache-2.0 Kokoro-82M speech generated from GitHub-authored SimJury cases."
          done

  generate:
    needs: prepare
    if: needs.prepare.outputs.cases != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        case_id: ${{ fromJSON(needs.prepare.outputs.cases) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: site/narration-requirements.txt
      - name: Install open-source speech tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng ffmpeg
          pip install --index-url https://download.pytorch.org/whl/cpu torch==2.9.1
          pip install -r site/narration-requirements.txt
      - name: Generate this case
        run: |
          node site/scripts/build-kokoro-jobs.mjs \
            --case "${{ matrix.case_id }}" --output .narration-jobs
          python site/scripts/generate-kokoro-clips.py \
            ".narration-jobs/${{ matrix.case_id }}.json" narration-clips
      - name: Stage clips for one rate-limited publication job
        uses: actions/upload-artifact@v4
        with:
          name: narration-${{ matrix.case_id }}
          path: narration-clips/
          retention-days: 1

  publish:
    needs: [prepare, generate]
    if: needs.prepare.outputs.cases != '[]'
    runs-on: ubuntu-latest
    # Full first-time publishes may wait through GITHUB_TOKEN hourly resets.
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Collect generated case packs
        uses: actions/download-artifact@v4
        with:
          pattern: narration-*
          path: narration-clips
          merge-multiple: true
      - name: Publish shard zips + missing MP3s only
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: node site/scripts/publish-kokoro-clips.mjs --clips narration-clips
