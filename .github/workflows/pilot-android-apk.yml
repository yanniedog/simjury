# Build SimJury pilot Android APK and publish to GitHub Releases (AR-local parity).
#
# Release gate: emulator install + launch smoke test must pass before publish.
# Rolling: app-apk-latest (manifest app-apk-latest.json for in-app self-update)
# Versioned: app-v{semver} e.g. app-v0.1.1
#
# Assets: app-preview.apk, app-apk-latest.json, app-preview-qr.png, install.html
#
# Optional secrets for signed release APK:
#   ANDROID_KEYSTORE_B64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
# Without secrets, builds unsigned release APK (debug signing fallback in Gradle).

name: pilot-android-apk

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'pilot/app/**'
      - 'pilot/case-model/**'
      - 'pilot/deliberation-core/**'
      - 'pilot/scripts/**'
      - '.github/workflows/pilot-android-apk.yml'
  pull_request:
    paths:
      - 'pilot/app/**'
      - 'pilot/case-model/**'
      - 'pilot/deliberation-core/**'
      - 'pilot/scripts/**'
      - '.github/workflows/pilot-android-apk.yml'

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: pilot-android-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-apk:
    name: pilot preview apk (GHA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Android SDK (build-only)
        run: bash .github/scripts/setup-android-sdk.sh pilot/local.properties

      - name: Bump Android versionCode from rolling manifest
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: node pilot/scripts/bump-android-version-code.mjs --repo "${{ github.repository }}"

      - name: Materialize release keystore (optional)
        id: keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_B64:-}" ]; then
            echo "$ANDROID_KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "No ANDROID_KEYSTORE_B64 — using Gradle debug signing for release build"
          fi

      - name: Cache Android debug keystore
        if: steps.keystore.outputs.configured != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: simjury-preview-debug-keystore-v1

      - name: Gradle assembleRelease
        working-directory: pilot
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEYSTORE_CONFIGURED: ${{ steps.keystore.outputs.configured }}
        run: |
          set -euo pipefail
          chmod +x gradlew
          if [ "${KEYSTORE_CONFIGURED}" = "true" ]; then
            ./gradlew :app:assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            ./gradlew :app:assembleRelease --no-daemon
          fi

      - name: Locate release APK
        id: apk
        run: |
          set -euo pipefail
          apk=$(find pilot/app/build/outputs/apk -name '*-release.apk' -type f | head -1)
          if [ -z "$apk" ]; then
            echo "::error::No release APK found"
            exit 1
          fi
          echo "path=$apk" >> "$GITHUB_OUTPUT"
          ls -lh "$apk"

      - name: Reset adb before emulator (avoid daemon conflicts with SDK setup)
        run: |
          set -euo pipefail
          pkill -9 adb 2>/dev/null || true
          adb kill-server 2>/dev/null || true
          sleep 2
          adb start-server
          adb devices

      - name: Emulator smoke test (attempt 1)
        id: smoke_attempt_1
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          force-avd-creation: true
          emulator-boot-timeout: 1200
          ram-size: 4096M
          cores: 2
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          pre-emulator-launch-script: |
            adb kill-server || true
            adb start-server
          script: APK_PATH="${{ steps.apk.outputs.path }}" BOOT_TIMEOUT_SEC=300 PACKAGE_MANAGER_TIMEOUT_SEC=180 ACTIVITY_TIMEOUT_SEC=180 UI_TIMEOUT_SEC=180 UI_DUMP_TIMEOUT_SEC=30 STABILIZE_SEC=15 bash pilot/scripts/emulator-smoke-test.sh

      - name: Emulator smoke test (attempt 2)
        id: smoke_attempt_2
        if: steps.smoke_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          force-avd-creation: true
          emulator-boot-timeout: 1200
          ram-size: 4096M
          cores: 2
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          pre-emulator-launch-script: |
            adb kill-server || true
            adb start-server
          script: APK_PATH="${{ steps.apk.outputs.path }}" BOOT_TIMEOUT_SEC=300 PACKAGE_MANAGER_TIMEOUT_SEC=180 ACTIVITY_TIMEOUT_SEC=180 UI_TIMEOUT_SEC=180 UI_DUMP_TIMEOUT_SEC=30 STABILIZE_SEC=15 bash pilot/scripts/emulator-smoke-test.sh

      - name: Require emulator smoke pass
        run: |
          set -euo pipefail
          if [ "${{ steps.smoke_attempt_1.outcome }}" = "success" ] || [ "${{ steps.smoke_attempt_2.outcome }}" = "success" ]; then
            echo "Emulator smoke test passed"
            exit 0
          fi
          echo "::error::Emulator smoke test failed after 2 attempts"
          exit 1

      - name: Install publish dependencies
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm install --no-save qrcode@1.5.4

      - name: Publish preview APK manifest (GitHub release)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node pilot/scripts/publish-apk-manifest.mjs --apk "${{ steps.apk.outputs.path }}" \
            --repo "${{ github.repository }}"

      - name: Upload workflow artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: simjury-preview-apk
          path: |
            pilot/build/apk-publish/app-preview.apk
            pilot/build/apk-publish/app-apk-latest.json
            pilot/build/apk-publish/app-preview-qr.png
            pilot/build/apk-publish/install.html
          if-no-files-found: error
