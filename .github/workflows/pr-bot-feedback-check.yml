name: pr-bot-feedback-check

# Thread closure gate. Runs on PR lifecycle AND on review-comment activity.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: bot-feedback-gate-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  bot-feedback-gate:
    if: >-
      github.event.pull_request != null
      || github.event.review != null
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Skip thread gate for non-human / chore PRs
        id: gate_exempt
        env:
          GH_TOKEN: ${{ secrets.BOT_GATE_TOKEN || github.token }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR="${{ inputs.pr_number }}"
          else
            PR="${{ github.event.pull_request.number }}"
          fi
          export PR
          EXEMPT=$(node scripts/pr-gate-exempt-reason.mjs || true)
          if [ -n "$EXEMPT" ]; then
            echo "gate_exempt=true" >> "$GITHUB_OUTPUT"
            echo "gate_exempt_reason=$EXEMPT" >> "$GITHUB_OUTPUT"
            echo "PR #$PR is gate-exempt ($EXEMPT) — thread closure not required"
          else
            echo "gate_exempt=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Gate exempt — pass (no thread closure)
        if: steps.gate_exempt.outputs.gate_exempt == 'true'
        run: |
          echo "bot-feedback-gate: skipped (${{ steps.gate_exempt.outputs.gate_exempt_reason }} — human bot review not required)"
      - name: Review thread closure gate
        if: steps.gate_exempt.outputs.gate_exempt != 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_GATE_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR="${{ inputs.pr_number }}"
          else
            PR="${{ github.event.pull_request.number }}"
          fi
          set +e
          npm run pr:bot-feedback-check -- --pr "$PR" --skip-bot-presence
          code=$?
          set -e
          if [ "$code" -eq 2 ]; then
            echo "::warning::GitHub API rate limit — re-run after quota resets"
            exit 1
          fi
          exit "$code"
