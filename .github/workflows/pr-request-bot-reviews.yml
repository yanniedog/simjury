name: pr-request-bot-reviews

# Codex does not auto-review like Gemini/Sourcery; post @codex review once per PR.
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-request-bot-reviews-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  request-codex-review:
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event.pull_request != null
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Skip gate-exempt PRs
        id: gate_exempt
        env:
          GH_TOKEN: ${{ secrets.BOT_GATE_TOKEN || github.token }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
        run: |
          case "${{ github.event_name }}" in
            workflow_dispatch) PR="${{ inputs.pr_number }}" ;;
            *)                 PR="${{ github.event.pull_request.number }}" ;;
          esac
          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export PR
          EXEMPT=$(node scripts/pr-gate-exempt-reason.mjs || true)
          if [ -n "$EXEMPT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "PR #$PR gate-exempt ($EXEMPT)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "pr=$PR" >> "$GITHUB_OUTPUT"
          fi
      - name: Request Codex review
        if: steps.gate_exempt.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_GATE_TOKEN || github.token }}
        run: |
          PR="${{ steps.gate_exempt.outputs.pr }}"
          node scripts/request-codex-review.mjs --pr "$PR"
