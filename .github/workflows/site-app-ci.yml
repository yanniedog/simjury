# The Daily Docket app (site/app) CI: lint · typecheck · test · validate:cases · build.
# Fast build/test gate. The app's output is deployed by site.yml through
# site/public/today/; this workflow does not deploy on its own.
name: site-app

on:
  pull_request:
    paths:
      - "site/app/**"
      - ".github/workflows/site-app-ci.yml"
  push:
    branches: [main]
    paths:
      - "site/app/**"
      - ".github/workflows/site-app-ci.yml"

permissions:
  contents: read

concurrency:
  group: site-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: site-app-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/app/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Validate cases (schema + design-quality gate)
        run: npm run validate:cases
      - name: Build
        run: npm run build
